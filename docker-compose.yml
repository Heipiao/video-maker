services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      VIDEO_MAKER_STORAGE_DIR: /app/storage
      VIDEO_MAKER_DATABASE_URL: sqlite:////app/storage/video_maker.db
      VIDEO_MAKER_PUBLIC_BASE_URL: http://localhost:8000
    volumes:
      - ./storage:/app/storage

  renderer:
    profiles: ["renderer"]
    build:
      context: .
      dockerfile: renderer/Dockerfile
    environment:
      VIDEO_MAKER_REMOTION_COMMAND: node remotion/render.mjs {manifest_path} {output_path}
