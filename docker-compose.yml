services:
  api:
    build:
      context: backend
      dockerfile: Dockerfile
    ports:
      - "8017:8017"
    environment:
      VIDEO_MAKER_STORAGE_DIR: /app/storage
      VIDEO_MAKER_PUBLIC_BASE_URL: http://localhost:8017
    volumes:
      - ./storage:/app/storage

  renderer:
    profiles: ["renderer"]
    build:
      context: renderer
      dockerfile: Dockerfile
    environment:
      VIDEO_MAKER_REMOTION_COMMAND: node remotion/render.mjs {manifest_path} {output_path}
